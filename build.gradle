buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // 使用与 Gradle 7.4 兼容的 Android Gradle Plugin 版本 7.3.1
        classpath 'com.android.tools.build:gradle:7.3.1'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
