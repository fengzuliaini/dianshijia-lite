name: Build Android APK

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch: # 支持在 GitHub 界面上手动点击按钮触发编译

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      statuses: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up pre-installed JDK 11
      run: |
        echo "JAVA_HOME=$JAVA_HOME_11_X64" >> $GITHUB_ENV
        echo "$JAVA_HOME_11_X64/bin" >> $GITHUB_PATH
 
    - name: Download and set up Gradle 7.4
      run: |
        wget -q https://services.gradle.org/distributions/gradle-7.4-bin.zip
        unzip -q gradle-7.4-bin.zip
        echo "$GITHUB_WORKSPACE/gradle-7.4/bin" >> $GITHUB_PATH

    - name: Build with Gradle
      run: gradle assembleDebug --stacktrace > build.log 2>&1

    - name: Commit and Push build log on failure
      if: failure()
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add build.log
        git commit -m "build failed: upload log [skip ci]"
        git push origin master

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: DianshijiaLite-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Diagnose Secrets
      run: |
        if [ -z "${{ secrets.VPS_HOST }}" ]; then echo "VPS_HOST is EMPTY"; else echo "VPS_HOST is CONFIGURED"; fi
        if [ -z "${{ secrets.VPS_USERNAME }}" ]; then echo "VPS_USERNAME is EMPTY"; else echo "VPS_USERNAME is CONFIGURED"; fi
        if [ -z "${{ secrets.VPS_PASSWORD }}" ]; then echo "VPS_PASSWORD is EMPTY"; else echo "VPS_PASSWORD is CONFIGURED"; fi
        if [ -z "${{ secrets.VPS_PORT }}" ]; then echo "VPS_PORT is EMPTY"; else echo "VPS_PORT is CONFIGURED"; fi
        if [ -z "${{ secrets.VPS_TARGET_DIR }}" ]; then echo "VPS_TARGET_DIR is EMPTY"; else echo "VPS_TARGET_DIR is CONFIGURED"; fi

    - name: Generate update.json
      run: |
        VERSION_CODE=$(grep -E 'versionCode\s+' app/build.gradle | awk '{print $2}')
        VERSION_NAME=$(grep -E 'versionName\s+' app/build.gradle | awk '{print $2}' | tr -d '"')
        if [ -z "$VERSION_CODE" ]; then VERSION_CODE="1"; fi
        if [ -z "$VERSION_NAME" ]; then VERSION_NAME="1.0.0"; fi
        echo "{" > update.json
        echo "  \"versionCode\": $VERSION_CODE," >> update.json
        echo "  \"versionName\": \"$VERSION_NAME\"," >> update.json
        echo "  \"apkUrl\": \"https://my.3223516.xyz/dianshijia-lite-32.apk\"," >> update.json
        echo "  \"apkUrl64\": \"https://my.3223516.xyz/dianshijia-lite-64.apk\"," >> update.json
        echo "  \"updateMessage\": \"发现新版本 $VERSION_NAME ($VERSION_CODE)！\\\n【本次核心优化与修复】：\\\n1. 修复手机上切换频道按第一下提示『正在连接信号源』卡死的 Bug；\\\n2. 增加手机滑动手势：屏幕左右滑动换源（切换线路），上下滑动换台，交互极佳；\\\n3. 侧边栏当前频道列表右侧新增金色快捷『换源』触控按钮，一键切源更直观；\\\n4. 原生适配 64 位手机系统，自动更新时根据系统架构自动路由分发（盒子下载 32 位精简包，手机下载 64 位原生包）；\\\n5. 彻底修复直播播放卡顿卡死问题，引入底层超时及 8 秒卡顿缓冲上层超时自动换线/重试自愈机制！\"" >> update.json
        echo "}" >> update.json
        cp app/build/outputs/apk/debug/app-armeabi-v7a-debug.apk dianshijia-lite-32.apk
        cp app/build/outputs/apk/debug/app-arm64-v8a-debug.apk dianshijia-lite-64.apk

    - name: Deploy to VPS
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        password: ${{ secrets.VPS_PASSWORD }}
        port: ${{ secrets.VPS_PORT }}
        source: "dianshijia-lite-32.apk,dianshijia-lite-64.apk,update.json"
        target: ${{ secrets.VPS_TARGET_DIR }}
        strip_components: 0
