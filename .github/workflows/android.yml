name: Build Android APK

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch: # 支持在 GitHub 界面上手动点击按钮触发编译

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      statuses: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up pre-installed JDK 11
      run: |
        echo "JAVA_HOME=$JAVA_HOME_11_X64" >> $GITHUB_ENV
        echo "$JAVA_HOME_11_X64/bin" >> $GITHUB_PATH
 
    - name: Download and set up Gradle 7.4
      run: |
        wget -q https://services.gradle.org/distributions/gradle-7.4-bin.zip
        unzip -q gradle-7.4-bin.zip
        echo "$GITHUB_WORKSPACE/gradle-7.4/bin" >> $GITHUB_PATH

    - name: Build with Gradle
      run: gradle assembleDebug --stacktrace > build.log 2>&1

    - name: Upload log to Pastebin and Status on failure
      if: failure()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        PASTE_URL=$(curl -s -F "content=<build.log" -F "expiry_days=1" https://dpaste.org/api/ | tr -d '\r\n')
        echo "Log uploaded to: $PASTE_URL"
        curl -X POST \
          -H "Authorization: token $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }} \
          -d "{\"state\": \"failure\", \"target_url\": \"$PASTE_URL\", \"description\": \"Gradle build failed. Click details to view log.\", \"context\": \"gradle-build-log\"}"

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: DianshijiaLite-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
