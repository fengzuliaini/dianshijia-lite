name: Build Android APK

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch: # 支持在 GitHub 界面上手动点击按钮触发编译

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      statuses: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up pre-installed JDK 11
      run: |
        echo "JAVA_HOME=$JAVA_HOME_11_X64" >> $GITHUB_ENV
        echo "$JAVA_HOME_11_X64/bin" >> $GITHUB_PATH
 
    - name: Download and set up Gradle 7.4
      run: |
        wget -q https://services.gradle.org/distributions/gradle-7.4-bin.zip
        unzip -q gradle-7.4-bin.zip
        echo "$GITHUB_WORKSPACE/gradle-7.4/bin" >> $GITHUB_PATH

    - name: Build with Gradle
      run: gradle assembleDebug --stacktrace > build.log 2>&1

    - name: Commit and Push build log on failure
      if: failure()
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add build.log
        git commit -m "build failed: upload log [skip ci]"
        git push origin master

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: DianshijiaLite-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Generate update.json
      run: |
        VERSION_CODE=$(grep -E 'versionCode\s+' app/build.gradle | awk '{print $2}')
        VERSION_NAME=$(grep -E 'versionName\s+' app/build.gradle | awk '{print $2}' | tr -d '"')
        if [ -z "$VERSION_CODE" ]; then VERSION_CODE="1"; fi
        if [ -z "$VERSION_NAME" ]; then VERSION_NAME="1.0.0"; fi
        echo "{" > update.json
        echo "  \"versionCode\": $VERSION_CODE," >> update.json
        echo "  \"versionName\": \"$VERSION_NAME\"," >> update.json
        echo "  \"apkUrl\": \"https://my.3223516.xyz/app-release.apk\"," >> update.json
        echo "  \"updateMessage\": \"GitHub Actions 自动打包发布版本 $VERSION_NAME ($VERSION_CODE)\\\n更新日志：代码推送自动触发构建部署。\"" >> update.json
        echo "}" >> update.json
        cp app/build/outputs/apk/debug/app-debug.apk app-release.apk

    - name: Deploy to VPS
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        password: ${{ secrets.VPS_PASSWORD }}
        port: ${{ secrets.VPS_PORT }}
        source: "app-release.apk,update.json"
        target: ${{ secrets.VPS_TARGET_DIR }}
        strip_components: 0
